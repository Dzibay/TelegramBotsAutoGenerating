# Установить на VPS (не в Docker): /etc/nginx/sites-available/tg-bots-generate.ru
# proxy_pass → docker-compose frontend на localhost:8080
#
# certbot --nginx -d tg-bots-generate.ru -d www.tg-bots-generate.ru

server {
    listen 80;
    listen [::]:80;
    server_name tg-bots-generate.ru www.tg-bots-generate.ru;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name tg-bots-generate.ru www.tg-bots-generate.ru;

    # Пути после certbot (обычно /etc/letsencrypt/live/tg-bots-generate.ru/)
    ssl_certificate     /etc/letsencrypt/live/tg-bots-generate.ru/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/tg-bots-generate.ru/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    client_max_body_size 100m;

    location / {
        proxy_pass http://127.0.0.1:8080;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
