services:
  postgres:
    image: postgres:16-alpine
    container_name: tgbots-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_NAME:-tg_bots}
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:?Set DB_PASSWORD in .env}
    ports:
      # Только localhost на хосте — НЕ открывайте PostgreSQL в интернет
      - "127.0.0.1:${DB_HOST_PORT:-5433}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/init.sql:/docker-entrypoint-initdb.d/01-init.sql:ro
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U ${DB_USER:-postgres} -d ${DB_NAME:-tg_bots} && PGPASSWORD=\"$$POSTGRES_PASSWORD\" psql -U ${DB_USER:-postgres} -d ${DB_NAME:-tg_bots} -c 'SELECT 1' >/dev/null",
        ]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s
    networks:
      - tgbots

  redis:
    image: redis:7-alpine
    container_name: tgbots-redis
    restart: unless-stopped
    # Только localhost на хосте — НЕ открывайте 6379 в интернет (см. логи SLAVEOF/REPLICAOF).
    ports:
      - "127.0.0.1:${REDIS_HOST_PORT:-6379}:6379"
    environment:
      REDIS_PASSWORD: ${REDIS_PASSWORD:?Set REDIS_PASSWORD in .env}
    command:
      - sh
      - -c
      - redis-server /usr/local/etc/redis/redis.conf --requirepass "$$REDIS_PASSWORD"
    volumes:
      - redis_data:/data
      - ./database/redis.conf:/usr/local/etc/redis/redis.conf:ro
    healthcheck:
      test: ["CMD-SHELL", "redis-cli -a \"$$REDIS_PASSWORD\" ping | grep -q PONG"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - tgbots

  api:
    build:
      context: .
      dockerfile: backend/Dockerfile
    image: tgbots-backend
    container_name: tgbots-api
    restart: unless-stopped
    env_file: .env
    environment:
      ENVIRONMENT: production
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:?Set ADMIN_PASSWORD in .env}
      JWT_SECRET_KEY: ${JWT_SECRET_KEY:?Set JWT_SECRET_KEY in .env}
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: ${DB_USER:-postgres}
      DB_PASSWORD: ${DB_PASSWORD:?Set DB_PASSWORD in .env}
      DB_NAME: ${DB_NAME:-tg_bots}
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379/0
      STORAGE_ROOT: /app/storage
    ports:
      - "5000:5000"
    volumes:
      - tdata_storage:/app/storage
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - tgbots

  worker:
    image: tgbots-backend
    container_name: tgbots-worker
    restart: unless-stopped
    command: ["python", "-m", "app.workers.creation_worker"]
    env_file: .env
    environment:
      SKIP_DB_INIT: "1"
      ENVIRONMENT: production
      WORKER_CONCURRENCY: ${WORKER_CONCURRENCY:-4}
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: ${DB_USER:-postgres}
      DB_PASSWORD: ${DB_PASSWORD:?Set DB_PASSWORD in .env}
      DB_NAME: ${DB_NAME:-tg_bots}
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379/0
      STORAGE_ROOT: /app/storage
    volumes:
      - tdata_storage:/app/storage
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      api:
        condition: service_started
    networks:
      - tgbots

  prep-worker:
    image: tgbots-backend
    container_name: tgbots-prep-worker
    restart: unless-stopped
    command: ["python", "-m", "app.workers.prep_worker"]
    env_file: .env
    environment:
      SKIP_DB_INIT: "1"
      ENVIRONMENT: production
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: ${DB_USER:-postgres}
      DB_PASSWORD: ${DB_PASSWORD:?Set DB_PASSWORD in .env}
      DB_NAME: ${DB_NAME:-tg_bots}
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379/0
      STORAGE_ROOT: /app/storage
    volumes:
      - tdata_storage:/app/storage
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      api:
        condition: service_started
    networks:
      - tgbots

  bot-runner:
    image: tgbots-backend
    container_name: tgbots-bot-runner
    restart: unless-stopped
    command: ["python", "-m", "app.bot_runner.main"]
    env_file: .env
    environment:
      SKIP_DB_INIT: "1"
      REDIS_URL: ""
      ENVIRONMENT: production
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: ${DB_USER:-postgres}
      DB_PASSWORD: ${DB_PASSWORD:?Set DB_PASSWORD in .env}
      DB_NAME: ${DB_NAME:-tg_bots}
      STORAGE_ROOT: /app/storage
    volumes:
      - tdata_storage:/app/storage
    depends_on:
      postgres:
        condition: service_healthy
      api:
        condition: service_started
    networks:
      - tgbots

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_BASE_URL: /api/v1
    container_name: tgbots-frontend
    restart: unless-stopped
    ports:
      - "8080:80"
    depends_on:
      - api
    networks:
      - tgbots

  caddy:
    image: caddy:2-alpine
    container_name: tgbots-caddy
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"
    environment:
      SITE_DOMAIN: ${SITE_DOMAIN:-tg-bots-generate.ru}
      ACME_EMAIL: ${ACME_EMAIL:-admin@tg-bots-generate.ru}
      NEURO_ENABLED: ${NEURO_ENABLED:-false}
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - frontend
    networks:
      - tgbots

volumes:
  postgres_data:
  redis_data:
  tdata_storage:
  caddy_data:
  caddy_config:

networks:
  tgbots:
    # Фиксированное имя — neuro_com и другие compose подключаются как external
    name: telegrambotsautogenerating_tgbots
    driver: bridge
