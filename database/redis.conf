# Redis для внутренней Docker-сети. Не публикуйте порт 6379 в интернет.
bind 0.0.0.0
port 6379
protected-mode yes

appendonly yes
dir /data

# Команды, которыми пользуются боты при сканировании открытого Redis
rename-command REPLICAOF ""
rename-command SLAVEOF ""
rename-command CONFIG ""
rename-command FLUSHALL ""
rename-command FLUSHDB ""
rename-command DEBUG ""
